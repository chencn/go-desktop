# 由 scripts/sync_project_metadata.go 根据 project.metadata.json 生成；不要手工修改。
# 修改产品名、仓库、版本兜底或 Windows 标识时，只改 project.metadata.json，再运行同步脚本。
version: '3'

info:
  companyName: "chencn"
  productName: "go-desktop"
  productIdentifier: "com.github.chencn.godesktop"
  description: "Wails3 中文桌面工具"
  copyright: "© 2026, chencn"
  comments: "github.com/chencn/go-desktop"
  version: "1.0.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: go run ./scripts/envrun wails3 task windows:build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations:

other:
  - name: My Other Data
