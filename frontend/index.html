<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wails.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>go-desktop</title>
    <style>
      :root {
        color-scheme: light;
        --boot-background: oklch(0.985 0 0);
        --boot-foreground: oklch(0.145 0 0);
        --boot-muted-foreground: oklch(0.48 0 0);
        --boot-primary: #1890ff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --boot-background: oklch(0.145 0 0);
          --boot-foreground: oklch(0.985 0 0);
          --boot-muted-foreground: oklch(0.708 0 0);
          --boot-primary: #1890ff;
        }
      }

      html,
      body,
      #app {
        min-height: 100vh;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--boot-background);
        color: var(--boot-foreground);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .boot-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--boot-background);
      }

      .ant-spin {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        color: var(--boot-primary);
        text-align: center;
      }

      .ant-spin-dot {
        position: relative;
        display: inline-block;
        width: 32px;
        height: 32px;
        animation: ant-spin-rotate 1.2s linear infinite;
      }

      .ant-spin-dot-item {
        position: absolute;
        display: block;
        width: 14px;
        height: 14px;
        border-radius: 100%;
        background-color: currentColor;
        opacity: 0.3;
        animation: ant-spin-move 1s linear infinite alternate;
      }

      .ant-spin-dot-item:nth-child(1) {
        top: 0;
        left: 0;
      }

      .ant-spin-dot-item:nth-child(2) {
        top: 0;
        right: 0;
        animation-delay: 0.4s;
      }

      .ant-spin-dot-item:nth-child(3) {
        right: 0;
        bottom: 0;
        animation-delay: 0.8s;
      }

      .ant-spin-dot-item:nth-child(4) {
        bottom: 0;
        left: 0;
        animation-delay: 1.2s;
      }

      .ant-spin-text {
        color: var(--boot-muted-foreground);
        font-size: 14px;
        line-height: 1.5715;
        letter-spacing: 0;
      }

      @keyframes ant-spin-rotate {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes ant-spin-move {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-loading" role="status" aria-live="polite">
        <div class="ant-spin ant-spin-lg" aria-label="正在加载">
          <span class="ant-spin-dot" aria-hidden="true">
            <i class="ant-spin-dot-item"></i>
            <i class="ant-spin-dot-item"></i>
            <i class="ant-spin-dot-item"></i>
            <i class="ant-spin-dot-item"></i>
          </span>
          <span class="ant-spin-text">正在加载</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
