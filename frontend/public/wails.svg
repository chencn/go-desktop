<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="go-desktop glossy 3d sunset icon">
  <defs>
    <!-- Original Sunset Gradient for Base Plate -->
    <linearGradient id="sunset" x1="212" y1="146" x2="812" y2="890" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fed7aa"/>
      <stop offset="0.48" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Original Mark Gradient for Cream Disc -->
    <linearGradient id="mark" x1="332" y1="270" x2="710" y2="752" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>

    <!-- Original Shadow Filter -->
    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#9a3412" flood-opacity="0.22"/>
    </filter>

    <!-- 3D Wall Gradient for Cream Disc (Extrudes from Cream to Base Orange) -->
    <linearGradient id="discWall" x1="258" y1="502" x2="766" y2="502" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="50%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <!-- 3D Wall Gradient for Left Cream Semi-circle -->
    <linearGradient id="whiteWall" x1="376" y1="502" x2="512" y2="638" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <!-- 3D Wall Gradient for Orange Core -->
    <linearGradient id="orangeWall" x1="394" y1="502" x2="630" y2="502" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Floating Disc Shadow (onto the base plate) -->
    <filter id="shadowDisc" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#9a3412" flood-opacity="0.18"/>
    </filter>

    <!-- Raised Left Semi-circle Shadow (onto the disc) -->
    <filter id="shadowLeft" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-4" dy="8" stdDeviation="8" flood-color="#9a3412" flood-opacity="0.15"/>
    </filter>

    <!-- Diagonal Gloss Reflection Gradient -->
    <linearGradient id="glossReflect" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="26%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Inner Bevel Highlight (Top-left light rim) -->
    <linearGradient id="bevelHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Inner Bevel Shadow (Bottom-right dark rim) -->
    <linearGradient id="bevelShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a3412" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0.4"/>
    </linearGradient>

    <!-- 3D Sphere Highlight for Orange Core -->
    <radialGradient id="coreSpecular" cx="32%" cy="32%" r="48%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip path matching the base plate (for clipping the base gloss line) -->
    <clipPath id="baseClip">
      <rect x="112" y="112" width="800" height="800" rx="196"/>
    </clipPath>

    <!-- Clip path matching the cream disc -->
    <clipPath id="discClip">
      <circle cx="512" cy="502" r="254"/>
    </clipPath>
  </defs>

  <!-- 1. BASE PLATE (WITH ORIGINAL SUNSET GRADIENT & SHADOW) -->
  <rect x="112" y="112" width="800" height="800" rx="196" fill="url(#sunset)" filter="url(#shadow)"/>

  <!-- 1b. BASE PLATE GLOSS & BEVELS -->
  <g clip-path="url(#baseClip)">
    <!-- Diagonal Light Reflection Streak -->
    <rect x="112" y="112" width="800" height="800" fill="url(#glossReflect)" opacity="0.8"/>
    
    <!-- Top-left White Bevel Rim -->
    <rect x="112" y="112" width="800" height="800" fill="none" stroke="url(#bevelHighlight)" stroke-width="6"/>

    <!-- Bottom-right Dark Bevel Rim -->
    <rect x="112" y="112" width="800" height="800" fill="none" stroke="url(#bevelShadow)" stroke-width="6"/>
  </g>

  <!-- 2. FLOATING LOGO GROUP SHADOW -->
  <g filter="url(#shadowDisc)">
    <circle cx="512" cy="520" r="254" fill="#9a3412" opacity="0.25"/>
  </g>

  <!-- 3. FLOATING CREAM DISC (At cy=502, extruding 16px down) -->
  <g>
    <!-- 3D Wall (Thickness) -->
    <path d="M258 502a254 254 0 0 0 508 0v16a254 254 0 0 1 -508 0z" fill="url(#discWall)"/>

    <!-- Disc Face (Original Mark Gradient) -->
    <circle cx="512" cy="502" r="254" fill="url(#mark)"/>
  </g>

  <!-- 3b. CREAM DISC GLOSS & SPECULAR -->
  <g clip-path="url(#discClip)">
    <!-- Diagonal Reflection Streak on Disc -->
    <circle cx="512" cy="502" r="254" fill="url(#glossReflect)" opacity="0.75"/>
    
    <!-- Top-Left Inner Glow reflection -->
    <radialGradient id="discCenterSpec" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <circle cx="512" cy="502" r="254" fill="url(#discCenterSpec)"/>

    <!-- Top-left Bevel Highlight -->
    <circle cx="512" cy="502" r="254" fill="none" stroke="url(#bevelHighlight)" stroke-width="3"/>
  </g>

  <!-- 4. RIGHT CRESCENT SHADOW (Original color and opacity) -->
  <path d="M512 248a254 254 0 0 1 0 508v-118a136 136 0 0 0 0-272z" fill="#9a3412" opacity="0.22"/>

  <!-- 5. LEFT CREAM SEMI-CIRCLE LAYER (At cy=502, extruding 16px down) -->
  <g filter="url(#shadowLeft)">
    <!-- 3D Wall (Thickness) -->
    <path d="M376 502a136 136 0 0 0 136 136v16a136 136 0 0 1 -136 -136z" fill="url(#whiteWall)"/>
    
    <!-- Face (Original Cream Color) -->
    <path d="M376 502c0-75 61-136 136-136v272c-75 0-136-61-136-136z" fill="#fff7ed"/>
  </g>

  <!-- 5b. LEFT CREAM SEMI-CIRCLE HIGHLIGHTS -->
  <!-- Highlight stroke on the left edge -->
  <path d="M376 502c0-75 61-136 136-136" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.75" stroke-linecap="round"/>
  <!-- Specular glare on left crescent -->
  <ellipse cx="440" cy="440" rx="30" ry="10" transform="rotate(-45 440 440)" fill="#ffffff" opacity="0.15"/>

  <!-- 6. CENTER ORANGE CIRCLE LAYER (At cy=502, extruding 16px down) -->
  <g>
    <!-- 3D Wall (Thickness) -->
    <path d="M394 502a118 118 0 0 0 236 0v16a118 118 0 0 1 -236 0z" fill="url(#orangeWall)"/>

    <!-- Face (Original Orange Color) -->
    <circle cx="512" cy="502" r="118" fill="#f97316"/>

    <!-- Specular Highlight Overlay (Glass Orb Reflection) -->
    <circle cx="512" cy="502" r="118" fill="url(#coreSpecular)"/>
    
    <!-- Top-left bright crescent rim highlight -->
    <path d="M410 452a118 118 0 0 1 150-70" fill="none" stroke="#ffffff" stroke-width="3.5" opacity="0.7" stroke-linecap="round"/>
    
    <!-- Bottom-right inner shadow reflection -->
    <path d="M512 620a118 118 0 0 0 102-60" fill="none" stroke="#9a3412" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- 7. GLOBAL GLOSS OVERLAY (Sweeping curved reflection across the entire logo) -->
  <path d="M290 386c110-110 260-110 370 0" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.45" stroke-linecap="round"/>
</svg>
